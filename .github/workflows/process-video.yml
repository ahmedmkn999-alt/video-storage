name: Video Processor Engine

on:
  push:
    paths:
      - 'videos/**' # يشتغل فقط لما فيديو جديد يترفع في فولدر فيديوز

jobs:
  process-video:
    runs-on: ubuntu-latest # بنستخدم سيرفر لينكس من جيت هب مجاناً

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg # تسطيب المحرك اللي بيضغط الفيديوهات

      - name: Process New Videos
        run: |
          for file in videos/*/*.mp4; do
            # التأكد إن الفيديو مش مضغوط قبل كدة عشان ما نكررش الشغل
            if [[ ! "$file" == *"-compressed.mp4" ]]; then
              echo "Processing $file..."
              # ضغط الفيديو وتصغير حجمه مع الحفاظ على الجودة
              ffmpeg -i "$file" -vcodec libx264 -crf 28 "${file%.mp4}-compressed.mp4"
              # مسح الفيديو الأصلي عشان نوفر مساحة
              rm "$status"
            fi
          done

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "VideoBot"
          git add .
          git commit -m "تم ضغط الفيديو وتحسينه للعرض 🚀"
          git push
          
