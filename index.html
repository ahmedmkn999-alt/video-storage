<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Video Server | سيرفر الفيديوهات</title>
    <style>
        :root {
            --primary: #00f2ff; /* لون نيون سيان */
            --accent: #7000ff;  /* بنفسجي */
            --bg: #0a0a0b;
            --card: #16161a;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .upload-card {
            background: var(--card);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #333;
        }

        h1 { color: var(--primary); font-size: 1.5rem; margin-bottom: 1rem; }

        .file-input-container {
            border: 2px dashed #444;
            padding: 2rem;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 1.5rem;
        }

        .file-input-container:hover { border-color: var(--primary); }

        #videoInput { display: none; }

        button {
            background: linear-gradient(45deg, var(--primary), var(--accent));
            border: none;
            padding: 12px 30px;
            color: white;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }

        .progress-bar {
            height: 8px;
            background: #222;
            border-radius: 10px;
            margin-top: 1rem;
            display: none;
            overflow: hidden;
        }

        #progressInner {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: 0.3s;
        }

        #status { margin-top: 1rem; font-size: 0.9rem; color: #aaa; }
    </style>
</head>
<body>

<div class="upload-card">
    <h1>Orbit Video Cloud</h1>
    <p>ارفع فيديوهاتك على سيرفرك الخاص مجاناً</p>
    
    <div class="file-input-container" onclick="document.getElementById('videoInput').click()">
        <span id="fileName">اضغط لاختيار فيديو</span>
        <input type="file" id="videoInput" accept="video/*">
    </div>

    <button onclick="uploadVideo()">بدء الرفع 🚀</button>

    <div class="progress-bar" id="progressBar">
        <div id="progressInner"></div>
    </div>

    <div id="status"></div>
</div>

<script>
    const videoInput = document.getElementById('videoInput');
    const fileNameDisplay = document.getElementById('fileName');
    const status = document.getElementById('status');
    const progressInner = document.getElementById('progressInner');
    const progressBar = document.getElementById('progressBar');

    videoInput.onchange = () => {
        fileNameDisplay.innerText = videoInput.files[0].name;
    };

    async function uploadVideo() {
        if (!videoInput.files[0]) return alert('اختار فيديو الأول يا بطل!');

        const file = videoInput.files[0];
        const reader = new FileReader();

        status.innerText = "جاري تجهيز الملف...";
        progressBar.style.display = "block";

        reader.readAsDataURL(file);
        reader.onload = async () => {
            const base64Data = reader.result.split(',')[1];
            
            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fileName: file.name,
                        fileData: base64Data,
                        userNickname: 'Ahmed' // ممكن تخليها ديناميكية بعدين
                    })
                });

                const result = await response.json();
                if (result.success) {
                    status.innerHTML = `تم الرفع! <br> <a href="${result.url}" target="_blank" style="color:var(--primary)">اضغط هنا لفتح الفيديو</a>`;
                    progressInner.style.width = "100%";
                } else {
                    status.innerText = "فشل الرفع: " + result.message;
                }
            } catch (err) {
                status.innerText = "خطأ في الاتصال بالسيرفر";
            }
        };
    }
</script>

</body>
</html>
