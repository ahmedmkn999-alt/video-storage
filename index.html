<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Video Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #00f2ff;
            --accent: #7000ff;
            --bg: #0a0a0b;
            --card: #16161a;
            --border: #2a2a2a;
            --text: #e0e0e0;
            --muted: #888;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        .view { display: none; }
        .view.active { display: block; }

        /* AUTH */
        .auth-wrap { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 1rem; }
        .auth-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; width: 100%; max-width: 400px; }
        .auth-card h1 { color: var(--primary); text-align: center; margin-bottom: 0.3rem; font-size: 1.6rem; }
        .auth-card .subtitle { color: var(--muted); text-align: center; margin-bottom: 1.8rem; font-size: 0.9rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; font-size: 0.85rem; color: var(--muted); }
        .form-group input { width: 100%; background: #111; border: 1px solid var(--border); color: white; padding: 12px 14px; border-radius: 10px; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
        .form-group input:focus { border-color: var(--primary); }
        .btn { background: linear-gradient(45deg, var(--primary), var(--accent)); border: none; padding: 13px; color: white; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; margin-top: 0.5rem; transition: opacity 0.2s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-sm { background: linear-gradient(45deg, var(--primary), var(--accent)); border: none; padding: 8px 18px; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .btn-icon { background: #1e1e22; border: 1px solid var(--border); color: var(--muted); padding: 7px 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; transition: border-color 0.2s; }
        .btn-icon:hover { border-color: var(--primary); color: var(--primary); }
        .btn-danger { background: #2a0f14; border: 1px solid #5a1a22; color: #ff6b6b; padding: 7px 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
        .auth-switch { text-align: center; margin-top: 1rem; color: var(--muted); font-size: 0.9rem; }
        .auth-switch a { color: var(--primary); cursor: pointer; }
        .err { color: #ff6b6b; font-size: 0.85rem; margin-top: 0.8rem; text-align: center; min-height: 1.2em; }
        .suc { color: #00f2aa; font-size: 0.85rem; margin-top: 0.8rem; text-align: center; }

        /* NAV */
        nav { background: var(--card); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
        .nav-logo { color: var(--primary); font-weight: bold; font-size: 1.1rem; }
        .nav-right { display: flex; align-items: center; gap: 1rem; }
        .nav-user { color: var(--muted); font-size: 0.85rem; }
        .logout-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; transition: border-color 0.2s; }
        .logout-btn:hover { border-color: #ff6b6b; color: #ff6b6b; }

        /* LAYOUT */
        .page { padding: 1.5rem; max-width: 960px; margin: 0 auto; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .page-header h2 { font-size: 1.3rem; }
        .loader { text-align: center; padding: 3rem; color: var(--muted); }
        .back-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; margin-bottom: 1.2rem; padding: 0; display: flex; align-items: center; gap: 0.4rem; }
        .back-btn:hover { color: var(--primary); }

        /* PROJECTS GRID */
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
        .project-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 1.3rem; transition: border-color 0.2s; }
        .project-card:hover { border-color: #444; }
        .project-card h3 { margin-bottom: 0.4rem; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .project-card .meta { color: var(--muted); font-size: 0.78rem; margin-bottom: 1rem; }
        .card-actions { display: flex; gap: 0.5rem; }
        .empty-state { text-align: center; padding: 4rem 1rem; color: var(--muted); }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
        .empty-state p { font-size: 0.95rem; line-height: 1.6; }

        /* NEW PROJECT */
        .form-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 1.8rem; max-width: 520px; margin: 0 auto; }
        .form-card h2 { color: var(--primary); margin-bottom: 1.5rem; font-size: 1.2rem; }
        .section-label { color: var(--muted); font-size: 0.82rem; margin: 1rem 0 0.6rem; }
        .quality-row { background: #111; border: 1px dashed var(--border); border-radius: 12px; padding: 0.9rem 1rem; margin-bottom: 0.6rem; cursor: pointer; transition: border-color 0.2s; display: flex; align-items: center; gap: 0.8rem; }
        .quality-row:hover { border-color: var(--primary); }
        .quality-row input[type=file] { display: none; }
        .q-badge { font-size: 0.75rem; font-weight: bold; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
        .q-1080 { background: rgba(255,80,80,0.15); color: #ff8080; border: 1px solid rgba(255,80,80,0.3); }
        .q-720  { background: rgba(255,165,0,0.15); color: #ffb347; border: 1px solid rgba(255,165,0,0.3); }
        .q-480  { background: rgba(255,220,0,0.15); color: #ffd700; border: 1px solid rgba(255,220,0,0.3); }
        .q-360  { background: rgba(0,200,100,0.15); color: #00e676; border: 1px solid rgba(0,200,100,0.3); }
        .q-filename { color: var(--muted); font-size: 0.82rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .progress-wrap { margin-top: 1rem; display: none; }
        .progress-bar { height: 8px; background: #1a1a1e; border-radius: 10px; overflow: hidden; margin-bottom: 0.4rem; }
        .progress-inner { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: width 0.4s; border-radius: 10px; }
        .progress-text { color: var(--muted); font-size: 0.82rem; text-align: center; }

        /* PROJECT DETAIL */
        .detail-header { margin-bottom: 1.5rem; }
        .detail-header h2 { font-size: 1.3rem; margin-bottom: 0.3rem; }
        .detail-header .token-info { color: var(--muted); font-size: 0.8rem; }
        .info-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.1rem; margin-bottom: 1rem; }
        .info-box .box-label { color: var(--muted); font-size: 0.78rem; margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.4rem; }
        .code-block { background: #0d0d0f; border: 1px solid var(--border); border-radius: 8px; padding: 0.8rem; font-family: monospace; font-size: 0.75rem; color: #7dd3fc; word-break: break-all; direction: ltr; text-align: left; margin-bottom: 0.6rem; line-height: 1.5; }
        .copy-btn { background: #1e1e22; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 7px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
        .copy-btn:hover { border-color: var(--primary); color: var(--primary); }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin: 1.5rem 0 0.8rem; }
        .section-header h3 { font-size: 1rem; }
        .video-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .video-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 0.8rem 1rem; display: flex; align-items: center; gap: 0.8rem; }
        .video-item .v-url { flex: 1; color: var(--muted); font-size: 0.78rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; direction: ltr; text-align: left; }
        .add-video-form { background: #111; border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem; margin-top: 0.8rem; display: none; }
        .video-entry { background: #0d0d0f; border: 1px solid var(--border); border-radius: 12px; padding: 1rem; margin-bottom: 0.8rem; position: relative; }
        .video-entry-title { margin-bottom: 0.7rem; }
        .video-entry-title input { width: 100%; background: #1a1a1e; border: 1px solid var(--border); color: white; padding: 9px 12px; border-radius: 8px; font-size: 0.85rem; outline: none; }
        .video-entry-title input:focus { border-color: var(--primary); }
        .remove-entry-btn { position: absolute; top: 0.7rem; left: 0.7rem; background: #2a0f14; border: 1px solid #5a1a22; color: #ff6b6b; padding: 4px 9px; border-radius: 7px; cursor: pointer; font-size: 0.75rem; }
        .add-entry-btn { background: #111; border: 1px dashed var(--primary); color: var(--primary); padding: 10px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 0.85rem; margin-top: 0.4rem; transition: background 0.2s; }
        .add-entry-btn:hover { background: rgba(0,242,255,0.06); }
        .video-item-name { font-size: 0.85rem; color: white; margin-bottom: 0.2rem; }

        /* DIVIDER */
        .divider { height: 1px; background: var(--border); margin: 1.5rem 0; }

        @media (max-width: 480px) {
            .page { padding: 1rem; }
            .form-card { padding: 1.3rem; }
            nav { padding: 0.8rem 1rem; }
        }
    </style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="view-login" class="view">
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>☁️ Orbit</h1>
      <p class="subtitle">سيرفر الفيديوهات الخاص بيك</p>
      <div class="form-group">
        <label>اسم المستخدم</label>
        <input type="text" id="login-user" placeholder="اسم المستخدم" onkeydown="if(event.key==='Enter')loginUser()">
      </div>
      <div class="form-group">
        <label>كلمة السر</label>
        <input type="password" id="login-pass" placeholder="••••••••" dir="ltr" onkeydown="if(event.key==='Enter')loginUser()">
      </div>
      <div id="login-err" class="err"></div>
      <button class="btn" id="login-btn" onclick="loginUser()">تسجيل الدخول</button>
      <div class="auth-switch">مش عندك حساب؟ <a onclick="showView('register')">سجل دلوقتي</a></div>
    </div>
  </div>
</div>

<!-- ===== REGISTER ===== -->
<div id="view-register" class="view">
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>☁️ Orbit</h1>
      <p class="subtitle">إنشاء حساب جديد</p>
      <div class="form-group">
        <label>اسم المستخدم</label>
        <input type="text" id="reg-user" placeholder="اختار اسم مستخدم">
      </div>
      <div class="form-group">
        <label>كلمة السر</label>
        <input type="password" id="reg-pass" placeholder="••••••••" dir="ltr">
      </div>
      <div class="form-group">
        <label>تأكيد كلمة السر</label>
        <input type="password" id="reg-pass2" placeholder="••••••••" dir="ltr" onkeydown="if(event.key==='Enter')registerUser()">
      </div>
      <div id="reg-err" class="err"></div>
      <button class="btn" id="reg-btn" onclick="registerUser()">إنشاء الحساب</button>
      <div class="auth-switch">عندك حساب؟ <a onclick="showView('login')">سجل دخول</a></div>
    </div>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="view-dashboard" class="view">
  <nav>
    <span class="nav-logo">☁️ Orbit Video Cloud</span>
    <div class="nav-right">
      <span class="nav-user" id="nav-name"></span>
      <button class="logout-btn" onclick="logoutUser()">خروج</button>
    </div>
  </nav>
  <div class="page">
    <div class="page-header">
      <h2>مشاريعي 🎬</h2>
      <button class="btn-sm" onclick="showView('new-project')">+ مشروع جديد</button>
    </div>
    <div id="projects-list"><div class="loader">⏳ جاري التحميل...</div></div>
  </div>
</div>

<!-- ===== NEW PROJECT ===== -->
<div id="view-new-project" class="view">
  <nav>
    <span class="nav-logo">☁️ Orbit Video Cloud</span>
    <div class="nav-right">
      <span class="nav-user" id="nav-name2"></span>
      <button class="logout-btn" onclick="logoutUser()">خروج</button>
    </div>
  </nav>
  <div class="page">
    <div class="form-card">
      <button class="back-btn" onclick="showView('dashboard')">← رجوع</button>
      <h2>🆕 مشروع جديد</h2>

      <div class="form-group">
        <label>اسم المشروع</label>
        <input type="text" id="proj-name" placeholder="مثال: كورس البرمجة - الجزء الأول">
      </div>

      <div class="section-label">📹 الفيديوهات (اختياري - ممكن ترفعهم بعدين)</div>
      <div id="np-video-entries"></div>
      <button class="add-entry-btn" onclick="addNpEntry()" style="margin-bottom:0.5rem">+ إضافة فيديو</button>

      <div class="progress-wrap" id="np-prog">
        <div class="progress-bar"><div class="progress-inner" id="np-bar"></div></div>
        <div class="progress-text" id="np-text">جاري الرفع...</div>
      </div>

      <div id="np-err" class="err"></div>
      <button class="btn" id="np-btn" onclick="createProject()" style="margin-top:1rem">🚀 إنشاء المشروع</button>
    </div>
  </div>
</div>

<!-- ===== PROJECT DETAIL ===== -->
<div id="view-project" class="view">
  <nav>
    <span class="nav-logo">☁️ Orbit Video Cloud</span>
    <div class="nav-right">
      <button class="logout-btn" onclick="logoutUser()">خروج</button>
    </div>
  </nav>
  <div class="page">
    <button class="back-btn" onclick="showView('dashboard')">← رجوع للمشاريع</button>
    <div id="proj-detail"><div class="loader">⏳ جاري التحميل...</div></div>
  </div>
</div>

<script>
const SB_URL  = 'https://wwtbgrizaytnyodfojez.supabase.co';
const SB_KEY  = 'sb_publishable_pGfSV54JD67soTi1eb-Wfg_H0WfXzu9';
const BUCKET  = 'videos';
const { createClient } = supabase;
const db = createClient(SB_URL, SB_KEY);

let me = null;

// ─── ROUTING ────────────────────────────────────────────────
function showView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    if (name === 'dashboard') loadProjects();
}

// ─── INIT ────────────────────────────────────────────────────
async function init() {
    const { data: { session } } = await db.auth.getSession();
    if (session) { me = session.user; setNavName(); showView('dashboard'); }
    else showView('login');
}

function setNavName() {
    const n = me?.user_metadata?.full_name || me?.email || '';
    ['nav-name','nav-name2'].forEach(id => { const el = document.getElementById(id); if(el) el.innerText = n; });
}

// ─── AUTH ────────────────────────────────────────────────────
async function loginUser() {
    const user = document.getElementById('login-user').value.trim().toLowerCase();
    const pass  = document.getElementById('login-pass').value;
    const err   = document.getElementById('login-err');
    const btn   = document.getElementById('login-btn');
    err.innerText = '';
    if (!user || !pass) { err.innerText = 'ادخل اسم المستخدم وكلمة السر'; return; }
    const email = user + '@orbit.app';
    btn.disabled = true; btn.innerText = 'جاري الدخول...';
    const { data, error } = await db.auth.signInWithPassword({ email, password: pass });
    btn.disabled = false; btn.innerText = 'تسجيل الدخول';
    if (error) { err.innerText = 'اسم المستخدم أو كلمة السر غلط'; return; }
    me = data.user; setNavName(); showView('dashboard');
}

async function registerUser() {
    const user  = document.getElementById('reg-user').value.trim().toLowerCase();
    const pass  = document.getElementById('reg-pass').value;
    const pass2 = document.getElementById('reg-pass2').value;
    const err   = document.getElementById('reg-err');
    const btn   = document.getElementById('reg-btn');
    err.innerText = '';
    if (!user || !pass || !pass2) { err.innerText = 'املأ كل الحقول'; return; }
    if (!/^[a-z0-9_]+$/.test(user)) { err.innerText = 'اسم المستخدم: حروف إنجليزية وأرقام و _ بس'; return; }
    if (pass !== pass2) { err.innerText = 'كلمة السر مش متطابقة'; return; }
    if (pass.length < 6) { err.innerText = 'كلمة السر 6 حروف على الأقل'; return; }
    const email = user + '@orbit.app';
    btn.disabled = true; btn.innerText = 'جاري الإنشاء...';
    const { data, error } = await db.auth.signUp({ email, password: pass, options: { data: { full_name: user } } });
    btn.disabled = false; btn.innerText = 'إنشاء الحساب';
    if (error) { err.innerText = error.message; return; }
    if (data.session) { me = data.user; setNavName(); showView('dashboard'); }
    else { me = data.user; setNavName(); showView('dashboard'); }
}

async function logoutUser() {
    await db.auth.signOut(); me = null; showView('login');
}

// ─── DASHBOARD ───────────────────────────────────────────────
async function loadProjects() {
    const el = document.getElementById('projects-list');
    el.innerHTML = '<div class="loader">⏳ جاري التحميل...</div>';
    const { data } = await db.from('projects').select('*').eq('user_id', me.id).order('created_at', { ascending: false });
    if (!data || !data.length) {
        el.innerHTML = `<div class="empty-state"><div class="icon">🎬</div><p>مفيش مشاريع لسه<br>ابدأ بإنشاء مشروعك الأول!</p></div>`;
        return;
    }
    el.innerHTML = `<div class="projects-grid">${data.map(p => `
        <div class="project-card">
            <h3>${esc(p.name)}</h3>
            <div class="meta">📅 ${new Date(p.created_at).toLocaleDateString('ar-EG')}</div>
            <div class="card-actions">
                <button class="btn-icon" onclick="openProject('${p.id}')">📂 فتح</button>
                <button class="btn-danger" onclick="delProject('${p.id}','${esc(p.name)}')">🗑️ حذف</button>
            </div>
        </div>`).join('')}</div>`;
}

async function delProject(id, name) {
    if (!confirm(`هتحذف "${name}"؟\nكل الفيديوهات هتتحذف!`)) return;
    await db.from('projects').delete().eq('id', id);
    loadProjects();
}

// ─── NEW PROJECT ─────────────────────────────────────────────
function pick(id) { document.getElementById(id).click(); }
function setFN(q, input) {
    const f = input.files[0];
    document.getElementById('fn-'+q).innerText = f ? '✅ ' + f.name : 'اضغط لاختيار الفيديو';
}

let _npCount = 0;
function addNpEntry() {
    const idx = 'np' + (_npCount++);
    const container = document.getElementById('np-video-entries');
    const div = document.createElement('div');
    div.className = 'video-entry';
    div.id = 'npentry-' + idx;
    div.innerHTML = `
        <button class="remove-entry-btn" onclick="this.closest('.video-entry').remove()">✕ حذف</button>
        <div class="video-entry-title">
            <input type="text" placeholder="اسم الفيديو (مثال: الدرس الأول)" id="npname-${idx}">
        </div>
        ${['1080','720','480','360'].map(q=>`
        <div class="quality-row" onclick="document.getElementById('npfile-${idx}-${q}').click()">
            <span class="q-badge q-${q}">${q}p</span>
            <span class="q-filename" id="npfn-${idx}-${q}">اضغط لاختيار الفيديو</span>
            <input type="file" id="npfile-${idx}-${q}" accept="video/*" style="display:none"
                onchange="document.getElementById('npfn-${idx}-${q}').innerText=this.files[0]?'✅ '+this.files[0].name:'اضغط لاختيار الفيديو'">
        </div>`).join('')}
    `;
    container.appendChild(div);
}

async function createProject() {
    const name = document.getElementById('proj-name').value.trim();
    const err  = document.getElementById('np-err');
    const btn  = document.getElementById('np-btn');
    err.innerText = '';
    if (!name) { err.innerText = 'ادخل اسم المشروع'; return; }
    btn.disabled = true; btn.innerText = 'جاري الإنشاء...';

    const token = Array.from(crypto.getRandomValues(new Uint8Array(24))).map(b=>b.toString(16).padStart(2,'0')).join('');
    const { data: proj, error } = await db.from('projects').insert({ user_id: me.id, name, token }).select().single();
    if (error) { err.innerText = 'خطأ: ' + error.message; btn.disabled=false; btn.innerText='🚀 إنشاء المشروع'; return; }

    await uploadNpQualities(proj.id);

    document.getElementById('proj-name').value = '';
    document.getElementById('np-video-entries').innerHTML = '';
    _npCount = 0;
    btn.disabled=false; btn.innerText='🚀 إنشاء المشروع';
    openProject(proj.id);
}

async function uploadNpQualities(projectId) {
    const entries = document.querySelectorAll('#np-video-entries .video-entry');
    const toUpload = [];
    for (const entry of entries) {
        const idxMatch = entry.id.match(/npentry-(.+)/);
        if (!idxMatch) continue;
        const idx = idxMatch[1];
        const videoName = document.getElementById('npname-' + idx)?.value.trim() || 'فيديو';
        for (const q of ['1080','720','480','360']) {
            const fileInput = document.getElementById(`npfile-${idx}-${q}`);
            if (fileInput?.files[0]) {
                toUpload.push({ q, file: fileInput.files[0], videoName });
            }
        }
    }
    if (!toUpload.length) return;
    document.getElementById('np-prog').style.display = 'block';
    let done = 0;
    for (const item of toUpload) {
        document.getElementById('np-text').innerText = `جاري رفع "${item.videoName}" - ${item.q}p... (${done+1}/${toUpload.length})`;
        const path = `${projectId}/${Date.now()}_${item.videoName}_${item.q}p.mp4`;
        const { error } = await db.storage.from(BUCKET).upload(path, item.file, { contentType: item.file.type, upsert: true });
        if (!error) {
            const { data: { publicUrl } } = db.storage.from(BUCKET).getPublicUrl(path);
            await db.from('videos').insert({ project_id: projectId, quality: item.q+'p', storage_path: path, url: publicUrl, video_name: item.videoName });
        }
        done++;
        document.getElementById('np-bar').style.width = (done/toUpload.length*100)+'%';
    }
    document.getElementById('np-text').innerText = '✅ تم رفع كل الفيديوهات!';
}

// ─── PROJECT DETAIL ──────────────────────────────────────────
async function openProject(id) {
    showView('project');
    const el = document.getElementById('proj-detail');
    el.innerHTML = '<div class="loader">⏳ جاري التحميل...</div>';
    const { data: proj } = await db.from('projects').select('*').eq('id', id).single();
    const { data: vids }  = await db.from('videos').select('*').eq('project_id', id).order('quality', {ascending:false});

    const embedUrl   = `${location.origin}/embed.html?project=${id}&token=${proj.token}`;
    const iframeCode = `<iframe src="${embedUrl}" width="100%" height="450" frameborder="0" allowfullscreen style="border-radius:12px"></iframe>`;
    const qMap = { '1080p':'q-1080','720p':'q-720','480p':'q-480','360p':'q-360' };

    el.innerHTML = `
        <div class="detail-header">
            <h2>${esc(proj.name)}</h2>
        </div>

        <div class="info-box">
            <div class="box-label">🔗 رابط المشغل المباشر</div>
            <div class="code-block" id="embed-url-txt">${embedUrl}</div>
            <button class="copy-btn" onclick="cp('embed-url-txt',this)">📋 نسخ الرابط</button>
        </div>

        <div class="info-box">
            <div class="box-label">🖥️ كود Embed للمنصة</div>
            <div class="code-block" id="iframe-txt">${esc(iframeCode)}</div>
            <button class="copy-btn" onclick="cp('iframe-txt',this)">📋 نسخ الكود</button>
        </div>

        <div class="divider"></div>

        <div class="section-header">
            <h3>📹 الفيديوهات (${vids?.length||0})</h3>
            <button class="btn-sm" onclick="toggleAddForm()">+ إضافة / تحديث</button>
        </div>

        <div id="add-form" class="add-video-form">
            <div class="section-label" style="margin-top:0">📹 إضافة فيديوهات جديدة للمشروع:</div>
            <div id="video-entries"></div>
            <button class="add-entry-btn" onclick="addVideoEntry()">+ إضافة فيديو جديد</button>
            <div class="progress-wrap" id="af-prog">
                <div class="progress-bar"><div class="progress-inner" id="af-bar"></div></div>
                <div class="progress-text" id="af-text"></div>
            </div>
            <button class="btn" onclick="addVids('${id}')" style="margin-top:0.8rem">رفع الفيديوهات ⬆️</button>
        </div>

        <div class="video-list" id="vid-list">
            ${vids&&vids.length ? vids.map(v=>`
            <div class="video-item">
                <span class="q-badge ${qMap[v.quality]||''}">${v.quality}</span>
                <div style="flex:1;overflow:hidden">
                    <div class="video-item-name">${esc(v.video_name||'بدون اسم')}</div>
                    <div class="v-url">${v.url}</div>
                </div>
                <button class="btn-danger" onclick="delVid('${v.id}','${id}')">🗑️</button>
            </div>`).join('') : '<div style="color:var(--muted);text-align:center;padding:1.5rem">مفيش فيديوهات لسه — اضغط + إضافة</div>'}
        </div>
    `;
    window._curProjId = id;
}

function toggleAddForm() {
    const f = document.getElementById('add-form');
    const showing = f.style.display === 'block';
    f.style.display = showing ? 'none' : 'block';
    if (!showing) {
        // reset entries
        document.getElementById('video-entries').innerHTML = '';
        window._entryCount = 0;
        addVideoEntry(); // add first entry by default
    }
}

let _entryCount = 0;
function addVideoEntry() {
    const idx = _entryCount++;
    const container = document.getElementById('video-entries');
    const div = document.createElement('div');
    div.className = 'video-entry';
    div.id = 'entry-' + idx;
    div.innerHTML = `
        <button class="remove-entry-btn" onclick="removeEntry(${idx})">✕ حذف</button>
        <div class="video-entry-title">
            <input type="text" placeholder="اسم الفيديو (مثال: الدرس الأول)" id="ename-${idx}">
        </div>
        ${['1080','720','480','360'].map(q=>`
        <div class="quality-row" onclick="document.getElementById('efile-${idx}-${q}').click()">
            <span class="q-badge q-${q}">${q}p</span>
            <span class="q-filename" id="efn-${idx}-${q}">اضغط لاختيار الفيديو</span>
            <input type="file" id="efile-${idx}-${q}" accept="video/*" style="display:none"
                onchange="document.getElementById('efn-${idx}-${q}').innerText=this.files[0]?'✅ '+this.files[0].name:'اضغط لاختيار الفيديو'">
        </div>`).join('')}
    `;
    container.appendChild(div);
}

function removeEntry(idx) {
    const el = document.getElementById('entry-' + idx);
    if (el) el.remove();
}

async function addVids(projectId) {
    const entries = document.querySelectorAll('#video-entries .video-entry');
    if (!entries.length) { alert('ضيف فيديو على الأقل'); return; }

    // collect all uploads
    const toUpload = [];
    for (const entry of entries) {
        const idxMatch = entry.id.match(/entry-(\d+)/);
        if (!idxMatch) continue;
        const idx = idxMatch[1];
        const videoName = document.getElementById('ename-' + idx)?.value.trim() || 'فيديو';
        for (const q of ['1080','720','480','360']) {
            const fileInput = document.getElementById(`efile-${idx}-${q}`);
            if (fileInput?.files[0]) {
                toUpload.push({ idx, q, file: fileInput.files[0], videoName });
            }
        }
    }

    if (!toUpload.length) { alert('اختار فيديو على الأقل'); return; }

    document.getElementById('af-prog').style.display = 'block';
    let done = 0;
    for (const item of toUpload) {
        document.getElementById('af-text').innerText = `جاري رفع "${item.videoName}" - ${item.q}p... (${done+1}/${toUpload.length})`;
        const path = `${projectId}/${Date.now()}_${item.videoName}_${item.q}p.mp4`;
        const { error } = await db.storage.from(BUCKET).upload(path, item.file, { contentType: item.file.type, upsert: true });
        if (!error) {
            const { data: { publicUrl } } = db.storage.from(BUCKET).getPublicUrl(path);
            await db.from('videos').insert({ project_id: projectId, quality: item.q+'p', storage_path: path, url: publicUrl, video_name: item.videoName });
        }
        done++;
        document.getElementById('af-bar').style.width = (done/toUpload.length*100)+'%';
    }
    document.getElementById('af-text').innerText = '✅ تم رفع كل الفيديوهات!';
    setTimeout(() => openProject(projectId), 800);
}

async function delVid(vidId, projId) {
    if (!confirm('هتحذف الفيديو ده؟')) return;
    await db.from('videos').delete().eq('id', vidId);
    openProject(projId);
}

// ─── HELPERS ─────────────────────────────────────────────────
function esc(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function cp(elId, btn) {
    const txt = document.getElementById(elId).innerText;
    navigator.clipboard.writeText(txt).then(() => {
        const orig = btn.innerText;
        btn.innerText = '✅ تم النسخ!';
        setTimeout(() => btn.innerText = orig, 2000);
    });
}

// ─── START ───────────────────────────────────────────────────
init();
</script>

</html>
